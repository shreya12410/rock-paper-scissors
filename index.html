<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissor</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div>
        <h1 id="head">Rock Paper Scissor Game</h1>
    </div>
    <div class="align">
        <div class="choice" id="rock">
            <img src="rock1.png">
        </div>
        <div class="choice" id="paper">
            <img src="pap.png">
        </div>
        <div class="choice" id="scissor">
            <img src="sci.jpg">
        </div>
    </div>
    <div id="content">
        <div>
            <h1 class="userscore">0</h1>
            <h2>Your Score</h2>
        </div>
        <div>
            <h1 class="compscore">0</h1>
            <h2>Computer Score</h2>
        </div>
    </div>
    <div id="data">
        <p>Play your move</p>
    </div>
    <script src="script.js"></script>

</body>

</html>
